  :root {

  .affirmation-list { list-style: none; padding: 0; }

  .save-heading { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 1rem; }
  .save-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .save-btn { padding: 13px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; gap: 6px; }

  .hidden { display: none !important; }
  @media (max-width: 480px) {
    .card { padding: 1.75rem 1.25rem; }
    .q-text { font-size: 19px; }
    .element-name { font-size: 26px; }
    .balance-grid { grid-template-columns: 1fr; }
    .save-btns { grid-template-columns: 1fr 1fr; }
  }
</style>

let current = 0, answers = [], selected = null, currentResult = null;

function renderStars() {
  const wrap = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 1;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
    wrap.appendChild(s);
  }
}

function renderQuestion() {
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('q-counter').textContent = `Question ${current+1} of ${questions.length}`;
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('q-label').textContent = q.label;
  document.getElementById('q-text').textContent = q.text;
  const optsEl = document.getElementById('options');
  optsEl.innerHTML = '';
  const letters = ['A','B','C','D'];
  selected = null;
  document.getElementById('btn-next').disabled = true;
  q.options.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${o.text}</span>`;
    btn.onclick = () => {
      optsEl.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selected = i;
      document.getElementById('btn-next').disabled = false;
    };
    optsEl.appendChild(btn);
  });
}

function buildGuide(el, color) {
  const g = el.guide;
  const tabs = [
    { id:'morning', label:'☀️ Morning', title:'Morning Activation Ritual', items: g.morning },
    { id:'movement', label:'🏃 Movement', title:'Movement Practices', items: g.movement },
    { id:'food', label:'🌿 Food', title:'Nourishing Foods', items: g.food },
    { id:'balance', label:'⚖️ Balance', special:'balance' },
    { id:'affirm', label:'✦ Affirmations', special:'affirm' },
  ];
  const tabsEl = document.getElementById('guide-tabs');
  const panelsEl = document.getElementById('guide-panels');
  tabsEl.innerHTML = ''; panelsEl.innerHTML = '';
  tabs.forEach((t, idx) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
    btn.textContent = t.label;
    if (idx === 0) btn.style.background = color;
    btn.onclick = () => {
      tabsEl.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.style.background = ''; });
      btn.classList.add('active'); btn.style.background = color;
      panelsEl.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + t.id).classList.add('active');
    };
    tabsEl.appendChild(btn);
    const panel = document.createElement('div');
    panel.className = 'tab-panel' + (idx === 0 ? ' active' : '');
    panel.id = 'panel-' + t.id;
    if (t.special === 'balance') {
      panel.innerHTML = `<div class="balance-grid">
        <div class="balance-box">
          <div class="balance-box-title" style="color:#ff6b35">⬇️ When Blocked</div>
          <ul class="guide-list">${g.blocked.map(i=>`<li>${i}</li>`).join('')}</ul>
          <div style="margin-top:10px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px">How to fix</div>
          <ul class="guide-list">${g.fix_blocked.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>
        <div class="balance-box">
          <div class="balance-box-title" style="color:#4da6ff">⬆️ When Excess</div>
          <ul class="guide-list">${g.excess.map(i=>`<li>${i}</li>`).join('')}</ul>
          <div style="margin-top:10px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px">How to fix</div>
          <ul class="guide-list">${g.fix_excess.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div></div>`;
    } else if (t.special === 'affirm') {
      panel.innerHTML = `<div class="guide-card"><ul class="affirmation-list">${g.affirmations.map(a=>`<li>${a}"</li>`).join('')}</ul></div>`;
    } else {
      panel.innerHTML = `<div class="guide-card"><div class="guide-card-title" style="color:${color}">${t.title}</div><ul class="guide-list">${t.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
    }
    panelsEl.appendChild(panel);
  });
}

function buildShareCard(el, sorted, maxScore) {
  document.getElementById('sc-icon').textContent = el.icon;
  document.getElementById('sc-name').style.color = el.color;
  document.getElementById('sc-name').textContent = el.name;
  document.getElementById('sc-tagline').textContent = el.tagline;
  document.getElementById('sc-desc').textContent = el.desc;
  document.getElementById('sc-traits').innerHTML = el.traits.map(t =>
    `<span class="sc-trait" style="border-color:${el.color}44;color:${el.color}">${t}</span>`
  ).join('');
  document.getElementById('sc-affirmation').style.color = el.color;
  document.getElementById('sc-affirmation').textContent = '"' + el.guide.affirmations[0] + '"';
  document.getElementById('sc-bars').innerHTML = sorted.slice(0,5).map(([k,v]) => {
    const e = elements[k];
    const pct = Math.round((v/maxScore)*100);
    return `<div class="sc-bar-row">
      <div class="sc-bar-lbl">${e.icon} ${e.name}</div>
      <div class="sc-bar-track"><div class="sc-bar-fill" style="width:${pct}%;background:${e.barColor}"></div></div>
      <div class="sc-bar-val">${v}</div>
    </div>`;
  }).join('');
}

function showResult() {
  const scores = { fire:0, water:0, earth:0, wood:0, thunder:0, ice:0, wind:0 };
  answers.forEach(a => Object.entries(a).forEach(([k,v]) => { scores[k] += v; }));
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const primary = sorted[0][0];
  const el = elements[primary];
  const maxScore = sorted[0][1] || 1;
  currentResult = { el, sorted, maxScore };

  document.getElementById('quiz-screen').classList.add('hidden');
  const rs = document.getElementById('result-screen');
  rs.classList.remove('hidden'); rs.style.display = 'block';
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('q-counter').textContent = 'Complete!';
  document.getElementById('q-pct').textContent = '100%';

  document.getElementById('res-icon').textContent = el.icon;
  document.getElementById('res-name').textContent = el.name;
  document.getElementById('res-name').style.color = el.color;
  document.getElementById('res-tagline').textContent = el.tagline;
  document.getElementById('res-desc').textContent = el.desc;
  document.getElementById('res-traits').innerHTML = el.traits.map(t =>
    `<span class="trait" style="border-color:${el.color}33;color:${el.color}">${t}</span>`
  ).join('');
  document.getElementById('res-secondary').innerHTML = sorted.slice(1,3).map(([k]) =>
    `<span class="sec-badge">${elements[k].icon} ${elements[k].name}</span>`
  ).join('');
  document.getElementById('res-bars').innerHTML = sorted.slice(0,6).map(([k,v]) => {
    const e = elements[k];
    const pct = Math.round((v/maxScore)*100);
    return `<div class="bar-row"><div class="bar-lbl">${e.icon} ${e.name}</div><div class="bar-track"><div class="bar-fill" style="width:0%;background:${e.barColor}" data-w="${pct}"></div></div><div class="bar-val">${v}</div></div>`;
  }).join('');
  setTimeout(() => { document.querySelectorAll('.bar-fill').forEach(b => { b.style.width = b.dataset.w + '%'; }); }, 100);
  buildGuide(el, el.color);
  buildShareCard(el, sorted, maxScore);
}

function showPopup(msg) {
  const p = document.getElementById('copy-popup');
  p.textContent = msg || '✓ Copied to clipboard!';
  p.classList.add('show');
  setTimeout(() => p.classList.remove('show'), 2500);
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showPopup()).catch(() => fallbackCopy(text));
  } else { fallbackCopy(text); }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showPopup(); } catch(e) { showPopup('Could not copy — try manually'); }
  document.body.removeChild(ta);
}

document.getElementById('btn-save-img').onclick = () => {
  if (!currentResult || typeof html2canvas === 'undefined') {
    showPopup('⏳ Loading image library...');
    setTimeout(() => document.getElementById('btn-save-img').click(), 1200);
    return;
  }
  const card = document.getElementById('share-card');
  card.style.top = '-9999px'; card.style.left = '0';
  html2canvas(card, { backgroundColor: '#0e0c1a', scale: 2, useCORS: true, logging: false }).then(canvas => {
    card.style.top = '-9999px'; card.style.left = '-9999px';
    const link = document.createElement('a');
    link.download = 'my-element-' + currentResult.el.name.toLowerCase() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showPopup('✓ Image saved!');
  }).catch(() => { showPopup('Could not save image'); });
};

document.getElementById('btn-save-pdf').onclick = () => {
  showPopup('✓ Opening print dialog...');
  setTimeout(() => window.print(), 400);
};

document.getElementById('btn-next').onclick = () => {
  if (selected === null) return;
  answers[current] = questions[current].options[selected].e;
  current++;
  if (current >= questions.length) showResult();
  else renderQuestion();
};

function reset() {
  current = 0; answers = []; selected = null; currentResult = null;
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  renderQuestion();
}
document.getElementById('btn-retake').onclick = reset;
document.getElementById('btn-new').onclick = reset;

renderStars();
renderQuestion();
